name: Sync Case Studies

on:
  schedule:
    - cron: '17 2 * * *'   # 2:17 UTC daily (2:17 AM GMT winter / 3:17 AM BST summer)
  workflow_dispatch: {}     # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape case studies
        run: python scripts/sync_case_studies.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add case_studies_cache.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update case_studies_cache.json (automated sync)"
          git push
